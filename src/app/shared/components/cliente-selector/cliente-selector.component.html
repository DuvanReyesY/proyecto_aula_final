<!-- src/app/shared/components/cliente-selector/cliente-selector.component.html -->
<ion-searchbar
  [(ngModel)]="busqueda"
  (ionInput)="filtrar()"
  placeholder="Buscar cliente..."
  debounce="200">
</ion-searchbar>

<ion-list style="max-height: 300px; overflow-y: auto;">
  <ion-item *ngIf="cargando">
    <ion-spinner name="crescent" slot="start"></ion-spinner>
    <ion-label>Cargando clientes...</ion-label>
  </ion-item>

  <ion-item *ngIf="!cargando && filtrados.length === 0">
    <ion-label color="medium">Sin resultados</ion-label>
  </ion-item>

  <ion-item
    *ngFor="let cliente of filtrados"
    button detail="false"
    (click)="seleccionar(cliente)">
    <ion-avatar slot="start">
      <ion-icon name="person-circle-outline" style="font-size: 36px;"></ion-icon>
    </ion-avatar>
    <ion-label>
      <h3>{{ cliente.Nombre }} {{ cliente.Apellido }}</h3>
      <p>{{ cliente.Correo }}</p>
      <p>{{ cliente.Telefono }}</p>
    </ion-label>
  </ion-item>
</ion-list>
