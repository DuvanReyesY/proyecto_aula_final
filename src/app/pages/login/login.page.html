<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="logo-container">
    <ion-icon name="paw" size="large" color="primary"></ion-icon>
    <h2>Veterinaria Canes</h2>
  </div>

  <ion-item>
    <ion-label position="floating">Correo</ion-label>
    <ion-input type="email" [(ngModel)]="email" placeholder="correo@ejemplo.com"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Contraseña</ion-label>
    <ion-input type="password" [(ngModel)]="password" placeholder="••••••••"></ion-input>
  </ion-item>

  <ion-text color="danger" *ngIf="error">
    <p class="ion-padding-start">{{ error }}</p>
  </ion-text>

  <ion-button expand="block" class="ion-margin-top" (click)="login()">
    Iniciar Sesión
  </ion-button>

  <ion-button expand="block" fill="clear" routerLink="/register">
    ¿No tienes cuenta? Regístrate
  </ion-button>

</ion-content>
